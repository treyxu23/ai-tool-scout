<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Radar icon -->
  <g transform="translate(200, 280)">
    <circle cx="0" cy="0" r="90" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.2"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.15"/>
    <line x1="0" y1="0" x2="0" y2="-90" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="90" y2="0" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>
    <!-- Sweeping line -->
    <line x1="0" y1="0" x2="63" y2="-63" stroke="#3fb950" stroke-width="3" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="4s" repeatCount="indefinite"/>
    </line>
    <circle cx="0" cy="0" r="5" fill="#3fb950"/>
    <!-- Dots (tools found) -->
    <circle cx="25" cy="-45" r="4" fill="#a371f7"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="-40" cy="-30" r="3" fill="#58a6ff"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="55" cy="20" r="3" fill="#3fb950"><animate attributeName="opacity" values="1;0.5;1" dur="2.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Title -->
  <text x="440" y="250" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,sans-serif" font-size="56" font-weight="800" fill="white">AI Tool</text>
  <text x="440" y="310" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,sans-serif" font-size="56" font-weight="800" fill="url(#accent)">Scout</text>

  <!-- Subtitle -->
  <text x="440" y="365" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="20" fill="#8b949e">自动发现 AI 工具 · 深度调研 · 生成选题报告</text>

  <!-- Pipeline -->
  <g transform="translate(440, 430)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="#1f6feb" opacity="0.2"/>
    <text x="60" y="21" font-family="PingFang SC" font-size="13" fill="#58a6ff" text-anchor="middle">🔍 多源发现</text>
    <text x="140" y="21" font-family="-apple-system" font-size="16" fill="#8b949e" text-anchor="middle">→</text>
    <rect x="160" y="0" width="120" height="32" rx="16" fill="#a371f7" opacity="0.2"/>
    <text x="220" y="21" font-family="PingFang SC" font-size="13" fill="#a371f7" text-anchor="middle">🦊 浏览器实测</text>
    <text x="300" y="21" font-family="-apple-system" font-size="16" fill="#8b949e" text-anchor="middle">→</text>
    <rect x="320" y="0" width="120" height="32" rx="16" fill="#238636" opacity="0.2"/>
    <text x="380" y="21" font-family="PingFang SC" font-size="13" fill="#3fb950" text-anchor="middle">📊 生成报告</text>
  </g>

  <rect x="0" y="560" width="1200" height="40" fill="#161b22" opacity="0.8"/>
  <text x="30" y="585" font-family="PingFang SC" font-size="13" fill="#8b949e">Hermes Skill · 需要 safari-web-agent · 输出到 Obsidian · 三平台选题建议</text>
  <text x="1170" y="585" font-family="ui-monospace,SFMono-Regular" font-size="13" fill="#58a6ff" text-anchor="end">treyxu23/trey-ai-tool-scout</text>
</svg>
